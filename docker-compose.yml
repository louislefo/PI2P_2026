services:

  # ─── Pont caméra CSI (nappe OV5647) ────────────────────────────────
  # Capture la caméra via rpicam-vid et expose un flux MJPEG HTTP
  # sur http://192.168.137.94:8081/stream
  camera-bridge-csi:
    build: 
      context: ./camera-bridge
      dockerfile: Dockerfile
    privileged: true              # Accès complet aux devices libcamera/ISP
    volumes:
      - /run/udev:/run/udev:ro    # Requis par libcamera pour la détection des devices
    ports:
      - "8081:8081"               # Optionnel : pour déboguer depuis le PC
    restart: always

  # ─── Pont caméra USB (WCAM100BK) ──────────────────────────────────
  # Capture la caméra USB via OpenCV et expose sur http://192.168.137.94:8082/stream
  camera-bridge-usb:
    build: 
      context: ./camera-bridge
      dockerfile: Dockerfile.usb
    privileged: true
    devices:
      - "/dev/video0:/dev/video0"
    ports:
      - "8082:8082"
    restart: always

  # ─── Dashboard React ────────────────────────────────────────────────
  dashboard:
    build: ./frontend
    ports:
      - "80:80"
    restart: always
