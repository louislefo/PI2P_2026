services:
  api:
    build: ./backend
    privileged: true
    devices:
      - "/dev/video0:/dev/video0"
      - "/dev/video1:/dev/video1"
      - "/dev/video2:/dev/video2"
      - "/dev/video14:/dev/video14"  # Souvent utilisé par le codec BCM pour renvoyer la vidéo du Pi
      - "/dev/media4:/dev/media4"
      - "/dev/media5:/dev/media5"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      - CONFIG_PATH=config/settings.json
      - DB_PATH=data/pi2p.db
    restart: always

  dashboard:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always
