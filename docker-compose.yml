services:

  # ─── Pont caméra CSI (nappe OV5647) ────────────────────────────────
  # Capture la caméra via rpicam-vid et expose un flux MJPEG HTTP
  # sur http://camera-bridge:8081/stream — consommé par le conteneur api
  camera-bridge:
    build: ./camera-bridge
    privileged: true              # Accès complet aux devices libcamera/ISP
    volumes:
      - /run/udev:/run/udev:ro    # Requis par libcamera pour la détection des devices
    ports:
      - "8081:8081"               # Optionnel : pour déboguer depuis le PC
    restart: always

  # ─── Backend FastAPI + YOLO + OCR ──────────────────────────────────
  api:
    build: ./backend
    privileged: true
    devices:
      - "/dev/video1:/dev/video1"   # Caméra USB WCAM100BK (vue d'ensemble)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      - CONFIG_PATH=config/settings.json
      - DB_PATH=data/pi2p.db
      - CSI_STREAM_URL=http://camera-bridge:8081/stream   # URL du pont CSI
    depends_on:
      - camera-bridge
    restart: always

  # ─── Dashboard React ────────────────────────────────────────────────
  dashboard:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always
