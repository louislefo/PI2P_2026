services:
  api:
    build: ./backend
    privileged: true
    devices:
      - "/dev/video0:/dev/video0" # Camera USB native
      - "/dev/video10:/dev/video10" # Camera Virtuelle CSI créée par v4l2loopback
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      - CONFIG_PATH=config/settings.json
      - DB_PATH=data/pi2p.db
    restart: always

  dashboard:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always
