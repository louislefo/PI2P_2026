services:
  api:
    build: ./backend
    privileged: true
    devices:
      - "/dev/video2:/dev/video0"  # Nappe -> index 0 interne
      - "/dev/video0:/dev/video1"  # USB -> index 1 interne
      - "/dev/media0:/dev/media0"
      - "/dev/media5:/dev/media5"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      - CONFIG_PATH=config/settings.json
      - DB_PATH=data/pi2p.db
    restart: always

  dashboard:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always
